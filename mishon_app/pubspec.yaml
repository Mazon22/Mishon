name: mishon_app
description: "Mishon Social Network - Flutter MVP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^5.0.2

  # Navigation
  go_router: ^14.2.0

  # Storage
  flutter_secure_storage: ^9.2.2

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Utils
  equatable: ^2.0.5
  intl: ^0.19.0
  json_annotation: ^4.9.0
  logger: ^2.4.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
