services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mishon}
      POSTGRES_USER: ${POSTGRES_USER:-mishon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-now}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mishon} -d ${POSTGRES_DB:-mishon}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mishon

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - mishon

  api:
    build:
      context: ./mishon-go-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8081}
      DATABASE_URL: postgres://${POSTGRES_USER:-mishon}:${POSTGRES_PASSWORD:-change-me-now}@postgres:5432/${POSTGRES_DB:-mishon}?sslmode=disable
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      JWT_KEY: ${JWT_KEY:-replace-with-a-long-random-secret-at-least-32-characters}
      JWT_ISSUER: ${JWT_ISSUER:-Mishon}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-MishonUsers}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-120}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*}
      WEB_DIST_DIR: ${WEB_DIST_DIR:-../mishon-web/dist}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@localhost}
      UPLOADS_DIR: ${UPLOADS_DIR:-}
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8081/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    expose:
      - "8081"
    networks:
      - mishon

  web:
    build:
      context: ./mishon-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - mishon

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - mishon

volumes:
  postgres_data:

networks:
  mishon:
